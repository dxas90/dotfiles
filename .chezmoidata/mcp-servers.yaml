mcp_servers:
  aws-knowledge-mcp-server:
    url: https://knowledge-mcp.global.api.aws
    type: http

  cloudflare-docs:
    url: https://docs.mcp.cloudflare.com/mcp
    type: http

  context7:
    command: npx
    args:
    - -y
    - "@upstash/context7-mcp"

  playwright:
    command: npx
    args:
    - -y
    - "@playwright/mcp@latest --config=${HOME}/.playwright/config.json"

  sequential-thinking:
    command: npx
    args:
    - -y
    - "@modelcontextprotocol/server-sequential-thinking"

  gopls:
    command: gopls
    args:
    - mcp
    type: stdio
